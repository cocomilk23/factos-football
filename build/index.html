<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
	<title>Volley Shot Survivor</title>
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
<link rel="manifest" href="index.manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<script>
if (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
  location.replace('https://' + location.host + location.pathname + location.search + location.hash);
}

<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; min-height: 100dvh; background: #06140d; overflow: hidden; overscroll-behavior: none; touch-action: none; position: fixed; inset: 0; }
#canvas, canvas { display: block !important; width: 100vw !important; height: 100vh !important; height: 100dvh !important; max-width: none !important; max-height: none !important; background: #06140d; image-rendering: pixelated; }
</style>
	<link rel="preload" href="index.js" as="script" fetchpriority="high">
	<link rel="preload" href="index.wasm" as="fetch" type="application/wasm" crossorigin fetchpriority="high">
	<link rel="preload" href="index.pck" as="fetch" crossorigin fetchpriority="high">
	<style>
		* {
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent;
		}

		html,
		body {
			margin: 0;
			width: 100%;
			height: 100%;
			min-height: 100dvh;
			overflow: hidden;
			background: #06140d;
			color: #ecfff7;
			touch-action: none;
			overscroll-behavior: none;
		}

		#canvas {
			position: fixed;
			inset: 0;
			width: 100vw;
			height: 100vh;
			height: 100dvh;
			background: #06140d;
			image-rendering: pixelated;
		}

		.loading-shell {
			position: fixed;
			inset: 0;
			z-index: 20;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: max(28px, env(safe-area-inset-top)) 28px max(28px, env(safe-area-inset-bottom));
			background:
				radial-gradient(ellipse at 50% 33%, rgba(101, 236, 255, 0.12), transparent 34%),
				repeating-linear-gradient(90deg, rgba(82, 142, 58, 0.26) 0 54px, rgba(20, 78, 43, 0.26) 54px 108px),
				linear-gradient(180deg, #0c4a2b, #05140d 70%, #020605);
		}

		.loading-card {
			width: min(420px, calc(100vw - 56px));
		}

		.brand-kicker {
			margin-bottom: 10px;
			font-family: Arial, system-ui, sans-serif;
			font-size: 12px;
			font-weight: 700;
			letter-spacing: 0.18em;
			text-align: center;
			text-transform: uppercase;
			color: #63e8ff;
		}

		.brand-title {
			margin: 0 0 34px;
			font-family: Impact, "Arial Black", system-ui, sans-serif;
			font-size: clamp(44px, 12vw, 68px);
			line-height: 0.9;
			letter-spacing: 0.02em;
			text-align: center;
			text-transform: uppercase;
			text-shadow: 0 4px 0 rgba(0, 0, 0, 0.52);
		}

		.brand-title span {
			color: #ffd34a;
		}

		.status-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 14px;
			margin-bottom: 10px;
			font: 700 12px/1.2 Arial, system-ui, sans-serif;
			letter-spacing: 0.08em;
			text-transform: uppercase;
		}

		.status-percent {
			color: #ffd34a;
			font-variant-numeric: tabular-nums;
		}

		.progress-track {
			height: 8px;
			overflow: hidden;
			background: rgba(0, 0, 0, 0.46);
			border: 1px solid rgba(236, 255, 247, 0.28);
		}

		.progress-fill {
			width: 100%;
			height: 100%;
			transform: scaleX(0.02);
			transform-origin: left center;
			background: linear-gradient(90deg, #63e8ff, #ffd34a);
		}

		.loading-shell.is-done {
			display: none;
		}

		.error-card {
			display: none;
			margin-top: 12px;
			padding: 10px;
			background: rgba(255, 74, 61, 0.18);
			border: 1px solid rgba(255, 74, 61, 0.65);
			color: #ffe2df;
			font: 13px/1.4 Arial, system-ui, sans-serif;
		}

		.loading-shell.has-error .error-card {
			display: block;
		}
	</style>
</head>
<body>
	<canvas id="canvas">Your browser does not support HTML5 canvas.</canvas>

	<div id="loading-shell" class="loading-shell" aria-live="polite">
		<div class="loading-card">
			<div class="brand-kicker">Volley Survival</div>
			<h1 class="brand-title">FACTOS <span>FOOTBALL</span></h1>
			<div class="status-row">
				<div id="loading-status">Loading engine</div>
				<div id="loading-percent" class="status-percent">0%</div>
			</div>
			<div class="progress-track">
				<div id="loading-progress" class="progress-fill"></div>
			</div>
			<div id="loading-error" class="error-card"></div>
		</div>
	</div>

	<noscript>JavaScript is required to run this game.</noscript>

	<script src="index.js"></script>
	<script>
		(() => {
			const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":16940016,"index.wasm":39509339},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"index.service.worker.js"};
			const GODOT_THREADS_ENABLED = false;
			const shell = document.getElementById("loading-shell");
			const canvas = document.getElementById("canvas");
			const fill = document.getElementById("loading-progress");
			const status = document.getElementById("loading-status");
			const percent = document.getElementById("loading-percent");
			const errorBox = document.getElementById("loading-error");
			let lastValue = 0;

			if (!GODOT_THREADS_ENABLED) {
				GODOT_CONFIG.ensureCrossOriginIsolationHeaders = false;
				GODOT_CONFIG.emscriptenPoolSize = 0;
				GODOT_CONFIG.godotPoolSize = 0;
			}

			function setProgress(current, total) {
				if (!total || total <= 0) {
					return;
				}
				lastValue = Math.max(lastValue, Math.min(1, current / total));
				fill.style.transform = `scaleX(${Math.max(0.02, lastValue)})`;
				percent.textContent = `${Math.round(lastValue * 100)}%`;
				status.textContent = lastValue > 0.72 ? "Starting match" : "Loading engine";
			}

			function showError(message) {
				shell.classList.add("has-error");
				status.textContent = "Boot failed";
				percent.textContent = "!";
				errorBox.textContent = message;
			}

			const missing = Engine.getMissingFeatures({
				threads: GODOT_THREADS_ENABLED,
			});

			if (missing.length !== 0) {
				showError("This browser is missing: " + missing.join(", ") + ". Use HTTPS and a modern mobile browser.");
				return;
			}

			new Engine(GODOT_CONFIG).startGame({
				canvas,
				onProgress: setProgress,
			}).then(() => {
				fill.style.transform = "scaleX(1)";
				percent.textContent = "100%";
				shell.classList.add("is-done");
			}).catch((err) => {
				showError(err && err.message ? err.message : String(err));
				console.error(err);
			});
		})();
	</script>
</body>
</html>
