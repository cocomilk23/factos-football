[preset.0]

name="Web"
platform="Web"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="_meta/*,screenshots/*,web/static/*,music/background.mp3,music/game-background.mp3"
export_path="build/index.html"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=true
html/export_icon=true
html/custom_html_shell="web/custom_shell.html"
html/head_include="<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no\">\n<script>\nif (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {\n  location.replace('https://' + location.host + location.pathname + location.search + location.hash);\n}\n</script>\n<style>\nhtml, body { margin: 0; padding: 0; width: 100%; height: 100%; min-height: 100dvh; background: #06140d; overflow: hidden; overscroll-behavior: none; touch-action: none; position: fixed; inset: 0; }\n#canvas, canvas { display: block !important; width: 100vw !important; height: 100vh !important; height: 100dvh !important; max-width: none !important; max-height: none !important; background: #06140d; image-rendering: pixelated; }\n</style>"
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=true
progressive_web_app/offline_page=""
progressive_web_app/display=1
progressive_web_app/orientation=1
progressive_web_app/icon_144x144="res://icon.svg"
progressive_web_app/icon_180x180="res://icon.svg"
progressive_web_app/icon_512x512="res://icon.svg"
progressive_web_app/background_color=Color(0.0235294, 0.0784314, 0.0509804, 1)

; build: cache-bust for clean deploy
